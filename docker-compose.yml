services:
  backend:
    build:
      context: ./backend
    image: galinette-backend:1.0
    container_name: galinette-backend
    restart: unless-stopped
    environment:
      GALINETTE_AD_DOMAIN: example.local
      GALINETTE_AD_NETBIOS: EXAMPLE
      GALINETTE_AD_DC: ""              # vide = auto-discovery DNS
      GALINETTE_AD_ADMIN_GROUP: Galinette-Admins
      GALINETTE_SESSION_TTL_SECONDS: "28800"
      # Audit
      GALINETTE_AUDIT_RETENTION_DAYS: "90"
      # Base de données : vide = SQLite local. Pour MariaDB :
      # mysql+pymysql://user:password@hostname:3306/galinette
      GALINETTE_DATABASE_URL: ""
      GALINETTE_COOKIE_SECURE: "true"
      GALINETTE_CORS_ORIGINS: '["https://galinette.example.local"]'
      GALINETTE_DATA_DIR: /data
    volumes:
      - galinette_data:/data
    networks:
      - galinette

  frontend:
    build:
      context: ./frontend
    image: galinette-frontend:1.0
    container_name: galinette-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8082:80"   # exposition locale pour NPM ; adapte le port si 8082 est pris
    networks:
      - galinette

volumes:
  galinette_data:

networks:
  galinette:
    driver: bridge
